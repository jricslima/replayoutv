    <style>
    :root { --primary: #e50914; --dark: #141414; --card-bg: #2f2f2f; --text: #ffffff; }
    body { background: var(--dark); color: var(--text); font-family: Arial, sans-serif; padding: 20px; margin: 0; }
    header { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding: 10px; }
    
    .filtros { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
    .btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .btn:hover { background: var(--primary); }
    .btn-natal { background: #2e7d32 !important; border: none !important; }

    .container { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
        gap: 15px; 
        max-width: 1400px; 
        margin: 0 auto; 
    }

    .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; border: 1px solid #444; height: 100%; }
    .capa { width: 100%; aspect-ratio: 2 / 3; object-fit: cover; background: #000; }
    .info { padding: 10px; flex-grow: 1; }
    .titulo { font-weight: bold; margin: 5px 0; font-size: 0.85rem; text-transform: uppercase; min-height: 40px; }
    .tag { font-size: 0.65rem; background: #444; padding: 2px 6px; border-radius: 4px; }
    .btn-link { background: var(--primary); color: white; text-decoration: none; text-align: center; padding: 10px; font-weight: bold; font-size: 0.8rem; margin-top: auto; display: block; }

    
    .menu-toggle {
    display: flex;

    gap: 10px;

}

.menu-toggle button {
    padding: 10px 25px;

    border-radius: 20px;
    background-color: #333;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.menu-toggle button.btn-ativo {
    background-color: #e50914; /* Vermelho estilo Netflix */

}

.menu-toggle button:hover {
    transform: scale(1.05);
}
    
    /* Estilo dos Botões Flutuantes */
    .nav-btn {
        display: none; 
        position: fixed; 
        right: 30px; 
        z-index: 999; 
        border: none; 
        background-color: var(--primary); 
        color: white; 
        cursor: pointer; 
        border-radius: 50%; 
        width: 50px;
        height: 50px;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        transition: 0.3s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .nav-btn:hover { transform: scale(1.1); background-color: #b20710; }

    #btnTopo { bottom: 20px; }
    #btnFinal { bottom: 80px; }
    #btnIrAoFim { bottom: 140px; background-color: #007bff; } /* Azul para o Salto Rápido */
    @media (max-width: 600px) {
        .container { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; }
        .nav-btn { width: 45px; height: 45px; font-size: 18px; right: 15px; }
        #btnFinal { bottom: 70px; }
    
    .filtros-letras {
    display: flex;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
    max-width: 1000px;
    margin: 0 auto 30px auto;
    padding: 0 10px;
}

.btn-l {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: 0.2s;
}

.btn-l:hover {
    background: var(--primary);
    border-color: var(--primary);
    transform: scale(1.1);
}

/* Estilo das Etiquetas sobre a imagem */
    .tag-ano {
        position: absolute;
        top: 5px;
        left: 5px;
        background: rgba(0, 0, 0, 0.7);
        color: #ccc;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: bold;
        z-index: 5;
    }

    .tag-geral {
        position: absolute;
        top: 5px;
        right: 5px;
        background: var(--primary);
        color: white;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: bold;
        z-index: 5;
        text-transform: uppercase;
    }
    
    /* Garante que o card seja a base para as tags não fugirem */
    .card { position: relative; }

@media (max-width: 600px) {
    .btn-l { width: 28px; height: 28px; font-size: 12px; }
}
    
    }

        position: absolute;
        top: 5px;
        padding: 2px 5px;

    }

    .tag-geral {
        right: 5px;

        color: white;
        text-transform: uppercase;
    }
    
		#btnPular { bottom: 180px; background-color: #2e7d32; } /* Verde para diferenciar */

		bottom: 140px !important;    /* 60px de distância do botão do meio */
		right: 30px !important;
		width: 50px !important;      /* Largura igual à altura para ser redondo */
		height: 50px !important;     /* Altura igual aos vermelhos */
		border-radius: 50% !important; /* Círculo perfeito */
		background-color: #007bff !important; /* Azul bonitinho */
		color: white !important;
		border: 2px solid white !important;
		align-items: center !important;
		justify-content: center !important;
		font-size: 20px !important;  /* Tamanho do ícone igual aos outros */
		padding: 0 !important;       /* Sem preenchimento extra */
		box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important;
}
		
		#btnTopo { bottom: 20px; }
    
    </style>
</head>
<body>

<header>

    <p id="contador" style="font-weight: bold; color: var(--primary); font-size: 1.1rem; text-align: center;">Total no Acervo: 0 filmes</p>
</header>

<div id="area-filtros-total" style="width: 100vw; margin-left: calc(-50vw + 50%); background: #000; padding: 30px 0; text-align: center; box-sizing: border-box;">
    <div style="margin-bottom: 25px;">
        <input type="text" id="inputBusca" onkeyup="buscar()" placeholder="🔍 Pesquisar por nome ou palavra..." style="width: 85%; max-width: 700px; padding: 15px 25px; border-radius: 30px; border: 2px solid var(--primary); background: #111; color: white; font-size: 1.1rem; outline: none; display: inline-block;">
    </div>

    <div class="filtros">
        <button class="btn" onclick="filtrar('todos')">Todos</button>
        <button class="btn btn-natal" onclick="filtrar('natal')">🎄 Natal</button>
        <button class="btn" onclick="filtrar('1930')">30s</button>
        <button class="btn" onclick="filtrar('1940')">40s</button>
        <button class="btn" onclick="filtrar('1950')">50s</button>
        <button class="btn" onclick="filtrar('1960')">60s</button>
        <button class="btn" onclick="filtrar('1970')">70s</button>

</div>

<div class="menu-toggle">
    <button onclick="alternar('series')" id="btn-series" class="btn-ativo">📺 Séries</button>
    <button onclick="alternar('filmes')" id="btn-filmes">🎬 Filmes</button>
</div>

<div id="container-filmes" class="grid-container" style="display:none"></div>

<div id="lista" class="container"></div>

</button>

</button>

</button>

<script src="series_acervo.js?v=202604052125"></script>

<script>
// --- 1. VARIÁVEIS GLOBAIS ---
let fonteDados = [];    
let listaAtual = [];    
let filmesExibidos = 20;

// 1. INICIALIZAÇÃO
window.onload = function() {
    // Começa exibindo as Séries por padrão
    alternar('filmes');
    // Gera as letras do alfabeto
    gerarLetras();
};

// --- 2. FUNÇÃO RENDERIZAR ---
function renderizar(itens, anexar = false) {
    const container = document.getElementById("lista");
    const contador = document.getElementById("contador");
    
    if (!container) return;
    if (!anexar) container.innerHTML = ""; 

    // ATUALIZA O CONTADOR AQUI
    if (contador) {
        const ehSerie = (window.series && listaAtual.length > 0 && window.series.includes(listaAtual[0]));
        contador.innerText = "Total: " + listaAtual.length + (ehSerie ? " Séries" : " Filmes") + " encontrados";
    }

    itens.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        
        const vAno = item.a || item.y || "";
        const vTag = item.tags || item.g || "";

        let conteudo = "";
        if (vAno) conteudo += '<span class="tag-ano">' + vAno + '</span>';
        if (vTag) conteudo += '<span class="tag-geral">' + vTag + '</span>';
        
        conteudo += '<img src="' + item.c + '" alt="' + item.t + '" class="capa" loading="lazy" onerror="this.src=\'img/sem-capa.png\'">';
        conteudo += '<div class="info">';
        conteudo += '<p class="titulo">' + item.t + '</p>';
        conteudo += '<a href="' + item.link + '" target="_blank" class="btn-link" style="text-decoration: none;">ASSISTIR DRIVE</a>';
        conteudo += '</div>';
        
        card.innerHTML = conteudo;
        container.appendChild(card);
    });
}// --- 3. FUNÇÃO ALTERNAR ---
function alternar(tipo) {
    const btnS = document.getElementById('btn-series');
    const btnF = document.getElementById('btn-filmes');
    
    if (tipo === 'series') {
        // Apenas direciona para o arquivo de séries
        fonteDados = (typeof series !== 'undefined') ? series : [];
        if(btnS) btnS.classList.add('btn-ativo');
        if(btnF) btnF.classList.remove('btn-ativo');
    } else {
        // Se por acaso for chamado para filmes, faz o mesmo que o seu filtrar('todos')
        fonteDados = (typeof filmes !== 'undefined') ? filmes : [];
        if(btnF) btnF.classList.add('btn-ativo');
        if(btnS) btnS.classList.remove('btn-ativo');
    }

    // Daqui para baixo é a mesma lógica que já funciona no seu "Natal" e "Décadas"
    listaAtual = fonteDados; 
    filmesExibidos = 20;
    renderizar(listaAtual.slice(0, filmesExibidos));
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
// --- 4. FILTROS ---
function filtrar(categoria) {
    filmesExibidos = 20;
    
    if (categoria === 'todos') {
        listaAtual = fonteDados;
    } 
    else if (categoria === 'natal') {
        listaAtual = fonteDados.filter(f => {
            // Pegamos o título do filme
            const t = f.t ? f.t.toLowerCase() : "";
            // A SOMA: Marcador n:1 OU nome Natal OU nome Christmas
            return f.n === 1 || t.includes('natal') || t.includes('christmas');
        });
    } 
    else if (categoria.length === 1) { 
        // Filtro por Letra (A, B, C...)
        listaAtual = fonteDados.filter(f => f.t && f.t.trim().toUpperCase().startsWith(categoria));
    }
    else {
        // Filtro por Década (1980, 1990...)
        const decada = categoria.substring(0, 3);
        listaAtual = fonteDados.filter(f => f.a && f.a.toString().startsWith(decada));
    }
    
    renderizar(listaAtual.slice(0, filmesExibidos));
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
function filtrarPorLetra(letra) {
    filmesExibidos = 20;
    if (letra === '0-9') {
        listaAtual = fonteDados.filter(f => /^[0-9]/.test(f.t));
    } else {
        listaAtual = fonteDados.filter(f => f.t && f.t.trim().toUpperCase().startsWith(letra));
    }
    renderizar(listaAtual.slice(0, filmesExibidos));
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buscar() {
    const termo = document.getElementById("inputBusca").value.toLowerCase();
    listaAtual = fonteDados.filter(f => f.t && f.t.toLowerCase().includes(termo));
    renderizar(listaAtual.slice(0, 20));
}

// 6. SCROLL INFINITO E BOTÕES
window.onscroll = function() {
    const t = document.getElementById("btnTopo");
    const f = document.getElementById("btnFinal");
    const i = document.getElementById("btnIrAoFim");
    const mostrar = (window.scrollY > 100);

    if(t) t.style.display = mostrar ? "flex" : "none";
    if(f) f.style.display = mostrar ? "flex" : "none";
    if(i) i.style.display = mostrar ? "flex" : "none";

    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
        if (filmesExibidos < listaAtual.length) {
            let inicio = filmesExibidos;
            filmesExibidos += 20;
            renderizar(listaAtual.slice(inicio, filmesExibidos), true);
        }
    }
};

// 7. FUNÇÕES DE NAVEGAÇÃO
function voltarAoTopo() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
function irAoFinal() { window.scrollBy({ top: window.innerHeight * 0.9, behavior: 'smooth' }); }

function saltoInstantaneo() {
    if (filmesExibidos < listaAtual.length) {
        filmesExibidos = listaAtual.length;
        renderizar(listaAtual);
    }
    setTimeout(() => {
        window.scrollTo(0, document.documentElement.scrollHeight);
    }, 100);
}
</script>
<div id="footer" style="padding: 20px;"></div>

</body>
